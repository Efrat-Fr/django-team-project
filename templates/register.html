{% extends 'base.html' %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="page">
    <div class="card" style="max-width: 500px;">
        <h1>יצירת חשבון חדש</h1>
        <p style="color: #aaa; margin-bottom: 20px;">הצטרף למערכת ניהול המשימות</p>

        <form method="post" class="auth-form">
            {% csrf_token %}

            <div class="form-wrapper">
                {{ form.as_p }}
            </div>

            <button type="submit" style="width: 100%; margin-top: 20px;">Register</button>
        </form>
    </div>
</div>
{% endblock %}
